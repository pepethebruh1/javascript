<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <title>Простые числа</title>
</head>
<body>
  <div class="card">
    <h1>Простые числа</h1>
    <form>
      <label for="n">Введите число n:</label>
      <input type="number" id="n" placeholder="Например, 100">
      <button type="button" onclick="findPrimes()">Найти простые числа</button>
      <label>Результат:</label>
      <textarea id="resultOutput" rows="5" readonly placeholder="Здесь появятся числа..."></textarea>
    </form>
  </div>
  <script>
    'use strict';
    function findPrimes() {
      const nInput = document.getElementById('n');
      const output = document.getElementById('resultOutput');
      const n = parseInt(nInput.value, 10);
      let result = '';
      if (isNaN(n) || n < 2) {
        output.value = 'Введите число больше 1';
        return;
      }
      for (let i = 2; i <= n; i++) {
        let isPrime = true;
        for (let j = 2; j * j <= i; j++) {
          if (i % j === 0) {
            isPrime = false;
            break;
          }
        }
        if (isPrime) {
          result += i + ' ';
        }
      }
      output.value = result.trim();
    }
  </script>
</body>
</html>
